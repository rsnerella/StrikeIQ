syntax = "proto3";

package marketdata;

enum Type {
  initial_feed = 0;
  live_feed = 1;
  market_info = 2;
}

message LTPC {
  double ltp = 1;
  double ltt = 2;
  double ltq = 3;
  double cp = 4;
}

message MarketLevel {
  double bid = 1;
  double ask = 2;
  int64 bidQty = 3;
  int64 askQty = 4;
}

message OptionGreeks {
  double iv = 1;
  double delta = 2;
  double theta = 3;
  double gamma = 4;
  double vega = 5;
}

message MarketOHLC {
  double open = 1;
  double high = 2;
  double low = 3;
  double close = 4;
}

message EFeedDetails {
  int64 openInterest = 1;
  int64 openInterestChange = 2;
  int64 volume = 3;
}

message IndexFF {
  LTPC ltpc = 1;
}

message MarketFF {
  LTPC ltpc = 1;
  MarketLevel marketLevel = 2;
  OptionGreeks optionGreeks = 3;
  MarketOHLC marketOHLC = 4;
  EFeedDetails eFeedDetails = 5;
}

message FF {
  oneof data {
    IndexFF indexFF = 1;
    MarketFF marketFF = 2;
  }
}

message Feed {
  oneof data {
    LTPC ltpc = 1;
    FF ff = 2;
  }
}

message FeedsEntry {
  string key = 1;
  Feed value = 2;
}

message FeedResponse {
  Type type = 1;
  repeated FeedsEntry feeds = 2;
}